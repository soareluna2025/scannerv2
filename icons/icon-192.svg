<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1e35"/>
      <stop offset="100%" stop-color="#080d18"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e8b0"/>
      <stop offset="100%" stop-color="#00a878"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0c4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <path d="M 44,130 A 62,62 0 1,1 148,62" fill="none" stroke="url(#teal)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="150" cy="59" r="5.5" fill="#00e8b0" filter="url(#glow)"/>

  <line x1="22" y1="78"  x2="46" y2="78"  stroke="url(#teal)" stroke-width="3"   stroke-linecap="round" opacity="0.9"/>
  <line x1="27" y1="88"  x2="46" y2="88"  stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="97"  x2="46" y2="97"  stroke="url(#teal)" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>

  <polygon points="50,128 72,48 84,48 62,128" fill="url(#teal)"/>
  <polygon points="72,48 84,48 108,128 96,128" fill="url(#teal)"/>
  <polygon points="58,98 66,74 78,74 70,98" fill="url(#bg)" opacity="0.9"/>

  <text x="103" y="128" font-family="-apple-system,Arial Black,sans-serif" font-size="82" font-weight="900" fill="url(#silver)" letter-spacing="-2">S</text>

  <text x="96" y="170" font-family="-apple-system,Arial,sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1.5">ALOHA<tspan fill="#00d4a8">SCAN</tspan></text>
</svg>
