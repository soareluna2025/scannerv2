<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AlohaScan Admin</title>
<style>
:root{--bg:#0d0f14;--bg2:#161920;--bg3:#1e2229;--bor:#2a2f3a;--mu:#7a8499;--mu2:#c8d0e0;--acc:#4a9eff;--green:#3ecf8e;--red:#ff4d4d;--yellow:#f5a623;--purple:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--mu2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--bor);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:800;font-size:16px;letter-spacing:1px;color:var(--acc)}.logo span{color:var(--mu);font-weight:400;font-size:12px;margin-left:8px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header-right{display:flex;align-items:center;gap:12px}
.key-input{background:var(--bg3);border:1px solid var(--bor);color:var(--mu2);padding:6px 10px;border-radius:6px;font-size:12px;width:280px;font-family:monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{opacity:.85}.btn-sm{padding:4px 10px;font-size:11px}
.btn-green{background:var(--green);color:#0d1a12}
.btn-red{background:var(--red)}
.container{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--bor);border-radius:10px;padding:16px}
.card-title{font-size:11px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bor)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--mu);font-size:12px}
.stat-val{font-weight:600;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge-green{background:#0d2b1e;color:var(--green)}.badge-red{background:#2b0d0d;color:var(--red)}
.badge-yellow{background:#2b2208;color:var(--yellow)}.badge-blue{background:#0d1e2b;color:var(--acc)}
.badge-gray{background:var(--bg3);color:var(--mu)}
.progress-bar{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;background:var(--acc)}
.progress-fill.warn{background:var(--yellow)}.progress-fill.danger{background:var(--red)}
.match-row{background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:12px}
.match-score{font-weight:800;font-size:15px;color:var(--acc);min-width:40px;text-align:center}
.match-teams{flex:1;color:var(--mu2)}
.match-min{color:var(--yellow);font-size:11px;min-width:28px}
.cron-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--bor)}
.cron-row:last-child{border-bottom:none}
.cron-name{font-size:12px;font-weight:600;color:var(--mu2)}
.cron-time{font-size:11px;color:var(--mu)}
.error-row{background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px}
.error-job{color:var(--yellow);font-weight:700;margin-bottom:2px}
.error-time{color:var(--mu);font-size:10px;margin-bottom:4px}
.error-msg{color:var(--red);word-break:break-word}
.refresh-info{color:var(--mu);font-size:11px;text-align:right;margin-bottom:12px}
.env-key{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:11px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--mu);font-size:12px;text-align:center;padding:20px 0}
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--bor);color:var(--mu2);padding:10px 16px;border-radius:8px;font-size:12px;display:none;z-index:999}
</style>
</head>
<body>

<header>
  <div class="logo">
    ALOHASCAN <span>ADMIN</span>
    <span id="sysStatus"><span class="status-dot"></span>conectare...</span>
  </div>
  <div class="header-right">
    <input id="apiKeyInput" class="key-input" type="password" placeholder="X-Api-Key..." autocomplete="off">
    <button class="btn" onclick="saveKeyAndRefresh()">Conectare</button>
  </div>
</header>

<div class="container">
  <div class="refresh-info" id="refreshInfo">— Introdu API key și apasă Conectare —</div>

  <div class="grid">
    <!-- Status sistem -->
    <div class="card" id="cardStatus">
      <div class="card-title">Status Sistem</div>
      <div class="empty">Neconectat</div>
    </div>

    <!-- DB Stats -->
    <div class="card" id="cardDB">
      <div class="card-title">Baza de Date</div>
      <div class="empty">Neconectat</div>
    </div>

    <!-- API Usage -->
    <div class="card" id="cardAPI">
      <div class="card-title">API Football Usage</div>
      <div class="empty">Neconectat</div>
    </div>
  </div>

  <!-- Live Matches -->
  <div class="card" style="margin-bottom:16px" id="cardLive">
    <div class="card-title">Meciuri LIVE <span id="liveCount"></span></div>
    <div class="empty">Neconectat</div>
  </div>

  <!-- Cron Jobs -->
  <div class="card" style="margin-bottom:16px" id="cardCron">
    <div class="card-title">Cron Jobs</div>
    <div class="empty">Neconectat</div>
  </div>

  <!-- Errors -->
  <div class="card" id="cardErrors">
    <div class="card-title">Erori Recente <span id="errCount"></span></div>
    <div class="empty">Neconectat</div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';
let _key = localStorage.getItem('aloha_admin_key') || '';
let _timer = null;

if (_key) {
  document.getElementById('apiKeyInput').value = _key;
  init();
}

function saveKeyAndRefresh() {
  _key = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('aloha_admin_key', _key);
  init();
}

function toast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.borderColor = color || 'var(--bor)';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.style.display='none'; }, 3000);
}

async function apiFetch(path) {
  const r = await fetch(BASE + path, { headers: { 'X-Api-Key': _key } });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function statusBadge(s) {
  if (!s || s === 'never') return '<span class="badge badge-gray">niciodată</span>';
  if (s === 'success' || s === 'ok') return '<span class="badge badge-green">✓ OK</span>';
  if (s === 'error') return '<span class="badge badge-red">✗ Eroare</span>';
  return '<span class="badge badge-yellow">' + s + '</span>';
}

function fmtDate(d) {
  if (!d) return '—';
  var dt = new Date(d);
  return dt.toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit'}) + ' ' +
    dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
}

function fmtUptime(s) {
  var h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h + 'h ' + m + 'm';
}

async function loadStatus() {
  try {
    var d = await apiFetch('/api/admin/status');
    var dot = d.db === 'OK'
      ? '<span class="status-dot" style="background:var(--green)"></span>ONLINE'
      : '<span class="status-dot" style="background:var(--red)"></span>DB ERR';
    document.getElementById('sysStatus').innerHTML = dot;

    var html = '';
    html += '<div class="stat-row"><span class="stat-label">Node.js</span><span class="stat-val">' + d.node + '</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Uptime</span><span class="stat-val">' + fmtUptime(d.uptime_s) + '</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Memorie heap</span><span class="stat-val">' + d.memory_mb + ' MB</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Baza de date</span><span class="stat-val"><span class="badge ' + (d.db==='OK'?'badge-green':'badge-red') + '">' + d.db + '</span></span></div>';
    if (d.env_keys) {
      html += '<div class="card-title" style="margin-top:10px">Variabile ENV</div>';
      d.env_keys.forEach(function(k){
        html += '<div class="env-key"><span class="stat-label">' + k.key + '</span><span class="badge ' + (k.set?'badge-green':'badge-red') + '">' + (k.set?'✓ SET':'✗ LIPSĂ') + '</span></div>';
      });
    }
    document.getElementById('cardStatus').innerHTML = '<div class="card-title">Status Sistem</div>' + html;
  } catch(e) {
    document.getElementById('sysStatus').innerHTML = '<span class="status-dot" style="background:var(--red)"></span>OFFLINE';
    document.getElementById('cardStatus').innerHTML = '<div class="card-title">Status Sistem</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function loadDB() {
  try {
    var d = await apiFetch('/api/admin/db-stats');
    var t = d.tables;
    var html = '';
    var rows = [
      ['fixtures_history', t.fixtures_history],
      ['league_stats',     t.league_stats],
      ['referee_stats',    t.referee_stats],
      ['match_stats',      t.match_stats],
      ['h2h',              t.h2h],
      ['standings',        t.standings],
      ['predictions',      t.predictions],
      ['player_stats',     t.player_stats],
      ['live acum',        t.live_snapshots],
    ];
    rows.forEach(function(r){
      html += '<div class="stat-row"><span class="stat-label">' + r[0] + '</span><span class="stat-val">' + Number(r[1]||0).toLocaleString('ro-RO') + '</span></div>';
    });
    document.getElementById('cardDB').innerHTML = '<div class="card-title">Baza de Date</div>' + html;
  } catch(e) {
    document.getElementById('cardDB').innerHTML = '<div class="card-title">Baza de Date</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function loadAPI() {
  try {
    var d = await apiFetch('/api/admin/api-usage');
    var pct = d.pct_used || 0;
    var fillClass = pct > 80 ? 'danger' : pct > 60 ? 'warn' : '';
    var html = '';
    html += '<div class="stat-row"><span class="stat-label">Plan</span><span class="stat-val">' + d.plan + '</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Expiră</span><span class="stat-val">' + (d.plan_end||'?') + '</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Utilizate azi</span><span class="stat-val">' + Number(d.requests_today).toLocaleString('ro-RO') + '</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Rămase</span><span class="stat-val">' + Number(d.remaining).toLocaleString('ro-RO') + ' / ' + Number(d.limit_day).toLocaleString('ro-RO') + '</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>';
    html += '<div style="text-align:right;font-size:11px;color:var(--mu)">' + pct + '% utilizat</div>';
    document.getElementById('cardAPI').innerHTML = '<div class="card-title">API Football Usage</div>' + html;
  } catch(e) {
    document.getElementById('cardAPI').innerHTML = '<div class="card-title">API Football Usage</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function loadLive() {
  try {
    var d = await apiFetch('/api/admin/live-matches');
    document.getElementById('liveCount').innerHTML = d.count > 0
      ? '<span class="badge badge-green">' + d.count + ' LIVE</span>'
      : '<span class="badge badge-gray">0</span>';
    var html = '';
    if (!d.matches || !d.matches.length) {
      html = '<div class="empty">Niciun meci live acum</div>';
    } else {
      d.matches.forEach(function(m){
        html += '<div class="match-row">';
        html += '<span class="match-min">' + (m.minute||'?') + '\'</span>';
        html += '<span class="match-teams">' + (m.home_team||'?') + ' vs ' + (m.away_team||'?') + '</span>';
        html += '<span class="match-score">' + (m.home_goals||0) + '-' + (m.away_goals||0) + '</span>';
        html += '<span class="badge badge-blue">' + (m.status_short||'LIVE') + '</span>';
        html += '</div>';
      });
    }
    document.getElementById('cardLive').innerHTML = '<div class="card-title">Meciuri LIVE <span id="liveCount"><span class="badge badge-' + (d.count>0?'green':'gray') + '">' + d.count + (d.count>0?' LIVE':'') + '</span></span></div>' + html;
  } catch(e) {
    document.getElementById('cardLive').innerHTML = '<div class="card-title">Meciuri LIVE</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function triggerCron(job) {
  try {
    var r = await fetch(BASE + '/api/admin/trigger-cron', {
      method: 'POST',
      headers: { 'X-Api-Key': _key, 'Content-Type': 'application/json' },
      body: JSON.stringify({ job }),
    });
    var d = await r.json();
    if (d.ok) toast('✓ ' + job + ' declanșat', 'var(--green)');
    else toast('✗ ' + (d.error||'Eroare'), 'var(--red)');
    setTimeout(loadCron, 2000);
  } catch(e) {
    toast('✗ ' + e.message, 'var(--red)');
  }
}

async function loadCron() {
  try {
    var d = await apiFetch('/api/admin/cron-status');
    var html = '';
    d.jobs.forEach(function(j){
      html += '<div class="cron-row">';
      html += '<span class="cron-name">' + j.job + '</span>';
      html += '<span class="cron-time">' + fmtDate(j.last_run) + '</span>';
      html += statusBadge(j.status);
      html += '<button class="btn btn-sm btn-green" onclick="triggerCron(\'' + j.job + '\')">▶ Run</button>';
      html += '</div>';
      if (j.error_msg) {
        html += '<div style="font-size:10px;color:var(--red);padding:2px 0 6px 0;word-break:break-word">' + j.error_msg + '</div>';
      }
    });
    document.getElementById('cardCron').innerHTML = '<div class="card-title">Cron Jobs</div>' + html;
  } catch(e) {
    document.getElementById('cardCron').innerHTML = '<div class="card-title">Cron Jobs</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function loadErrors() {
  try {
    var d = await apiFetch('/api/admin/errors');
    document.getElementById('errCount').innerHTML = d.count > 0
      ? '<span class="badge badge-red">' + d.count + '</span>'
      : '<span class="badge badge-green">0</span>';
    var html = '';
    if (!d.errors || !d.errors.length) {
      html = '<div class="empty" style="color:var(--green)">✓ Nicio eroare recentă</div>';
    } else {
      d.errors.slice(0,20).forEach(function(e){
        html += '<div class="error-row">';
        html += '<div class="error-job">' + (e.job_name||'unknown') + '</div>';
        html += '<div class="error-time">' + fmtDate(e.ran_at) + '</div>';
        html += '<div class="error-msg">' + (e.error_msg||'status: ' + e.status) + '</div>';
        html += '</div>';
      });
    }
    document.getElementById('cardErrors').innerHTML = '<div class="card-title">Erori Recente <span id="errCount"><span class="badge ' + (d.count>0?'badge-red':'badge-green') + '">' + d.count + '</span></span></div>' + html;
  } catch(e) {
    document.getElementById('cardErrors').innerHTML = '<div class="card-title">Erori Recente</div><div class="empty" style="color:var(--red)">' + e.message + '</div>';
  }
}

async function refresh() {
  document.getElementById('refreshInfo').textContent = 'Actualizare...';
  await Promise.allSettled([
    loadStatus(), loadDB(), loadAPI(),
    loadLive(), loadCron(), loadErrors(),
  ]);
  var now = new Date().toLocaleTimeString('ro-RO');
  document.getElementById('refreshInfo').textContent = 'Ultima actualizare: ' + now + ' (auto-refresh 30s)';
}

function init() {
  if (_timer) clearInterval(_timer);
  refresh();
  _timer = setInterval(refresh, 30000);
}
</script>
</body>
</html>
