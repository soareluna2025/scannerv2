name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: API_FOOTBALL_KEY,SUPABASE_URL,SUPABASE_KEY
          command_timeout: 5m
          script: |
            export PATH="/snap/bin:$PATH"
            trap '' TERM

            # 1. Pull cod si instaleaza dependente
            cd /root/scannerv2
            git pull origin main
            npm install --silent
            true

            # 2. Scrie .env cu cheile din GitHub Secrets
            python3 -c "
            import os
            lines = []
            lines.append('API_FOOTBALL_KEY=' + os.environ.get('API_FOOTBALL_KEY',''))
            lines.append('SUPABASE_URL=' + os.environ.get('SUPABASE_URL',''))
            lines.append('SUPABASE_KEY=' + os.environ.get('SUPABASE_KEY',''))
            open('/root/scannerv2/.env','w').write('\n'.join(lines) + '\n')
            print('ENV scris: ' + str(len(lines)) + ' chei')
            "
            chmod 600 /root/scannerv2/.env
            echo "ENV OK: $(wc -l < /root/scannerv2/.env) chei"

            # 3. Serviciu systemd
            python3 -c "
            svc = '[Unit]\nDescription=AlohaScan Node.js\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/root/scannerv2\nExecStart=/snap/bin/node /root/scannerv2/server.js\nEnvironmentFile=-/root/scannerv2/.env\nRestart=always\nRestartSec=5\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n'
            open('/etc/systemd/system/alohascan.service','w').write(svc)
            print('systemd service scris OK')
            "
            systemctl daemon-reload
            systemctl enable alohascan
            systemctl restart alohascan
            sleep 2
            systemctl is-active alohascan && echo "APP: ONLINE" || echo "APP: ERROR"
            journalctl -u alohascan -n 10 --no-pager 2>/dev/null || true

            # 4. Nginx - elibereaza portul 80
            apt-get install -y nginx -qq 2>/dev/null; true
            systemctl stop coolify 2>/dev/null; true
            docker ps -q --filter "publish=80" 2>/dev/null | xargs -r docker stop 2>/dev/null; true
            fuser -k 80/tcp 2>/dev/null; true
            lsof -ti:80 2>/dev/null | xargs -r kill -9 2>/dev/null; true
            sleep 1

            python3 -c "
            cfg = 'server {\n    listen 80 default_server;\n    server_name _;\n    location / {\n        proxy_pass http://127.0.0.1:3000;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade \$http_upgrade;\n        proxy_set_header Connection \$http_connection;\n        proxy_set_header Host \$host;\n        proxy_set_header X-Real-IP \$remote_addr;\n        proxy_cache_bypass \$http_upgrade;\n    }\n}\n'
            open('/etc/nginx/sites-available/alohascan','w').write(cfg)
            print('nginx config scrisa OK')
            "
            ln -sf /etc/nginx/sites-available/alohascan /etc/nginx/sites-enabled/alohascan
            rm -f /etc/nginx/sites-enabled/default
            nginx -t 2>&1
            systemctl restart nginx
            systemctl enable nginx
            sleep 2

            # 5. Cron jobs - la fiecare ora
            crontab -l 2>/dev/null | grep -v "localhost:3000" > /tmp/crontab_clean || true
            cat >> /tmp/crontab_clean << 'CRONEOF'
0 * * * * curl -sf http://localhost:3000/api/cron/scan >> /var/log/alohascan-cron.log 2>&1
30 * * * * curl -sf http://localhost:3000/api/update-results >> /var/log/alohascan-cron.log 2>&1
15 * * * * curl -sf http://localhost:3000/api/cron/collect-daily >> /var/log/alohascan-cron.log 2>&1
45 * * * * curl -sf http://localhost:3000/api/cron/collect-finished >> /var/log/alohascan-cron.log 2>&1
CRONEOF
            crontab /tmp/crontab_clean
            echo "CRON: $(crontab -l | grep -c localhost:3000) joburi configurate"

            # 6. Ruleaza cron-urile imediat prima data
            echo "=== RULARE INITIALA CRON-URI ==="
            curl -sf http://localhost:3000/api/cron/scan >> /var/log/alohascan-cron.log 2>&1 && echo "scan: OK" || echo "scan: SKIP"
            curl -sf http://localhost:3000/api/cron/collect-daily >> /var/log/alohascan-cron.log 2>&1 && echo "collect-daily: OK" || echo "collect-daily: SKIP"
            curl -sf http://localhost:3000/api/cron/collect-finished >> /var/log/alohascan-cron.log 2>&1 && echo "collect-finished: OK" || echo "collect-finished: SKIP"
            curl -sf http://localhost:3000/api/update-results >> /var/log/alohascan-cron.log 2>&1 && echo "update-results: OK" || echo "update-results: SKIP"

            echo "NGINX: $(systemctl is-active nginx)"
            echo "ALOHASCAN: $(systemctl is-active alohascan)"
            echo "DONE: $(date)"
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
