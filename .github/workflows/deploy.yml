name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: VERCEL_TOKEN
          script: |
            export PATH="/snap/bin:$PATH"

            # 0. Opreste orice proces node rulat manual
            pkill -f "node server.js" 2>/dev/null || true
            sleep 2

            # 1. Pull latest code
            cd /root/scannerv2
            git pull origin main
            npm install --silent

            # 2. Fetch env vars din Vercel si scrie .env
            PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              python3 -c "
            import sys,json
            data=json.load(sys.stdin)
            p=[x for x in data.get('projects',[]) if 'scannerv2' in x.get('name','')]
            print(p[0]['id'] if p else '')
            " 2>/dev/null)

            if [ -n "$PROJECT_ID" ]; then
              curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" | \
                python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            envs = data.get('envs', [])
            lines = []
            for e in envs:
                key = e.get('key','')
                val = e.get('value','') or e.get('decryptedValue','')
                if key and val:
                    lines.append(f'{key}={val}')
            print('\n'.join(lines))
            " > /root/scannerv2/.env
              chmod 600 /root/scannerv2/.env
              echo "ENV: $(wc -l < /root/scannerv2/.env) chei scrise"
            else
              echo "WARNING: nu am gasit proiectul Vercel - folosesc .env existent"
            fi

            # 3. Porneste/restarteza aplicatia cu PM2
            pm2 restart alohascan 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            # 4. Instaleaza si configureaza nginx (prima data)
            if ! command -v nginx &>/dev/null; then
              apt-get install -y nginx -qq
            fi

            cat > /etc/nginx/sites-available/alohascan << 'NGINX'
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/alohascan /etc/nginx/sites-enabled/alohascan
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx
            systemctl enable nginx

            # 5. Deschide porturile in firewall
            ufw allow 80/tcp 2>/dev/null || true
            ufw allow 3000/tcp 2>/dev/null || true

            echo "=============================="
            echo "Deploy complet: $(date)"
            echo "App: http://$(curl -s ifconfig.me 2>/dev/null || echo '192.248.183.230')"
            echo "=============================="
            pm2 list
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
