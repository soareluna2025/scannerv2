name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main, claude/generate-ssh-key-vultr-8S9YY]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: API_FOOTBALL_KEY,POSTGRES_URL,ANTHROPIC_API_KEY,XAI_API_KEY,BACKUP_TOKEN,FEATURE_NGP_TIMEDECAY
          command_timeout: 8m
          script: |
            export PATH="/snap/bin:$PATH"

            # Pull latest code (reset hard to avoid divergent branches issues)
            cd /root/scannerv2

            # Păstrează artefactele ML (gitignored) peste git reset --hard:
            # model_export.json (pre-meci) + model_live_export.json (live v2) +
            # straturile de calibrare (calibration_export.json / *_live_export.json).
            cp ml/model_live_export.json /tmp/model_live_export.json.bak 2>/dev/null || true
            cp ml/model_export.json /tmp/model_export.json.bak 2>/dev/null || true
            cp ml/calibration_export.json /tmp/calibration_export.json.bak 2>/dev/null || true
            cp ml/calibration_live_export.json /tmp/calibration_live_export.json.bak 2>/dev/null || true

            git fetch origin
            git reset --hard origin/main

            # Restaurează artefactele ML după reset (dacă existau înainte).
            cp /tmp/model_live_export.json.bak ml/model_live_export.json 2>/dev/null || true
            cp /tmp/model_export.json.bak ml/model_export.json 2>/dev/null || true
            cp /tmp/calibration_export.json.bak ml/calibration_export.json 2>/dev/null || true
            cp /tmp/calibration_live_export.json.bak ml/calibration_live_export.json 2>/dev/null || true

            npm install --silent

            # Write .env with secrets from GitHub
            EXISTING_KEY=$(grep '^ADMIN_API_KEY=' /root/scannerv2/.env 2>/dev/null | cut -d= -f2)
            if [ -z "$EXISTING_KEY" ]; then
              NEW_KEY=$(python3 -c "import uuid; print(str(uuid.uuid4()))")
              KEY_STATUS="generat nou"
            else
              NEW_KEY="$EXISTING_KEY"
              KEY_STATUS="existent"
            fi
            # Persistă CRON_SECRET între deploy-uri (același pattern ca ADMIN_API_KEY)
            EXISTING_CRON=$(grep '^CRON_SECRET=' /root/scannerv2/.env 2>/dev/null | cut -d= -f2-)
            if [ -z "$EXISTING_CRON" ]; then
              CRON_VAL=$(openssl rand -hex 32)
              CRON_STATUS="generat nou"
            else
              CRON_VAL="$EXISTING_CRON"
              CRON_STATUS="existent"
            fi
            printf 'API_FOOTBALL_KEY=%s\nPOSTGRES_URL=%s\nANTHROPIC_API_KEY=%s\nXAI_API_KEY=%s\nADMIN_API_KEY=%s\nCRON_SECRET=%s\nFEATURE_NGP_TIMEDECAY=%s\n' \
              "$API_FOOTBALL_KEY" "$POSTGRES_URL" "$ANTHROPIC_API_KEY" "$XAI_API_KEY" "$NEW_KEY" "$CRON_VAL" "${FEATURE_NGP_TIMEDECAY:-false}" \
              > /root/scannerv2/.env
            echo "ENV scris: 7 chei, ADMIN_API_KEY: $KEY_STATUS, CRON_SECRET: $CRON_STATUS, NGP_TIMEDECAY: ${FEATURE_NGP_TIMEDECAY:-false}"
            chmod 600 /root/scannerv2/.env
            echo "ENV OK: $(wc -l < /root/scannerv2/.env) chei"

            # Backup token — scris din secret GitHub
            if [ -n "$BACKUP_TOKEN" ]; then
              echo "$BACKUP_TOKEN" > /root/.github_backup_token
              chmod 600 /root/.github_backup_token
              echo "BACKUP TOKEN: setat"
            fi

            # Backup script — instalare
            mkdir -p /root/scripts
            cp /root/scannerv2/scripts/backup-db.sh /root/scripts/backup-db.sh
            chmod +x /root/scripts/backup-db.sh
            echo "BACKUP SCRIPT: instalat"

            # Crontab — sursă UNICĂ de adevăr: scripts/setup-crontab.sh
            # (citește CRON_SECRET din .env scris mai sus + injectează headerul
            #  x-cron-secret pe toate apelurile /api/cron/*).
            bash /root/scannerv2/scripts/setup-crontab.sh

            # Asigură că portul 3000 e deschis în firewall
            ufw allow 3000/tcp 2>/dev/null || true

            # Restart aplicație via PM2 (singurul process manager — SystemD eliminat)
            pm2 restart alohascan || pm2 start /root/scannerv2/ecosystem.config.cjs && pm2 save
            sleep 4

            # Verificare că serverul răspunde
            pm2 describe alohascan >/dev/null 2>&1 && echo "ALOHASCAN: ONLINE (pm2)" || echo "ALOHASCAN: ERROR"
            curl -sf http://localhost:3000/health && echo " ← HEALTH OK" || echo "HEALTH FAILED — verifică logs: pm2 logs alohascan --lines 50"

            echo "Deploy complet: $(date)"
            echo "Accesează: http://$(curl -s ifconfig.me 2>/dev/null || echo '192.248.183.230'):3000"
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
          # Feature flag — default 'false' dacă secretul nu e setat (zero impact).
          FEATURE_NGP_TIMEDECAY: ${{ secrets.FEATURE_NGP_TIMEDECAY }}
