name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main, claude/generate-ssh-key-vultr-8S9YY]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: API_FOOTBALL_KEY,POSTGRES_URL,ANTHROPIC_API_KEY,XAI_API_KEY
          command_timeout: 8m
          script: |
            export PATH="/snap/bin:$PATH"

            # Pull latest code
            cd /root/scannerv2
            git pull origin main
            npm install --silent

            # Write .env with secrets from GitHub
            python3 -c "
            import os
            lines = []
            lines.append('API_FOOTBALL_KEY=' + os.environ.get('API_FOOTBALL_KEY',''))
            lines.append('POSTGRES_URL=' + os.environ.get('POSTGRES_URL',''))
            lines.append('ANTHROPIC_API_KEY=' + os.environ.get('ANTHROPIC_API_KEY',''))
            lines.append('XAI_API_KEY=' + os.environ.get('XAI_API_KEY',''))
            open('/root/scannerv2/.env','w').write('\n'.join(lines) + '\n')
            print('ENV scris: ' + str(len(lines)) + ' chei')
            "
            chmod 600 /root/scannerv2/.env
            echo "ENV OK: $(wc -l < /root/scannerv2/.env) chei"

            # Restart serviciu systemd
            systemctl restart alohascan
            systemctl is-active alohascan && echo "ALOHASCAN: ONLINE" || echo "ALOHASCAN: ERROR"

            echo "Deploy complet: $(date)"
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
