name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main, claude/generate-ssh-key-vultr-8S9YY]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch env vars from Vercel and deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VERCEL_TOKEN
          script: |
            export PATH="/snap/bin:$PATH"

            # Pull latest code
            cd /root/scannerv2
            git pull origin main
            npm install --silent

            # Fetch all env vars from Vercel API and write .env
            echo "Fetching env vars from Vercel..."
            PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              python3 -c "import sys,json; projects=json.load(sys.stdin)['projects']; \
              p=[x for x in projects if 'scannerv2' in x.get('name','')]; \
              print(p[0]['id'] if p else '')" 2>/dev/null)

            if [ -n "$PROJECT_ID" ]; then
              curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" | \
                python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            envs = data.get('envs', [])
            lines = []
            for e in envs:
                key = e.get('key','')
                val = e.get('value','') or e.get('decryptedValue','')
                if key and val:
                    lines.append(f'{key}={val}')
            print('\n'.join(lines))
            " > /root/scannerv2/.env
              chmod 600 /root/scannerv2/.env
              echo "ENV vars written: $(wc -l < /root/scannerv2/.env) keys"
            else
              echo "WARNING: Could not fetch Vercel env vars - using existing .env"
            fi

            # Start or restart app
            pm2 restart alohascan 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            echo "Deploy complet: $(date)"
            pm2 list
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
