name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get orgId from Vercel API
        id: org
        run: |
          INFO=$(curl -s "https://api.vercel.com/v9/projects/prj_6KIlo6YA9b8LMJ31455I1abJUEld" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          echo "Response: $INFO"
          ORG=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('accountId',''))" 2>/dev/null || echo "")
          echo "orgId=$ORG" >> $GITHUB_OUTPUT
          echo "Found orgId: $ORG"

      - name: Write .vercel/project.json
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_6KIlo6YA9b8LMJ31455I1abJUEld","orgId":"${{ steps.org.outputs.orgId }}"}' > .vercel/project.json
          cat .vercel/project.json

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
