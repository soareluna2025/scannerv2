name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: prj_6KIlo6YA9b8LMJ31455I1abJUEld

    steps:
      - name: Upsert SUPABASE_URL
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          ENVS=$(curl -s \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $TOKEN")

          ENV_ID=$(echo "$ENVS" | jq -r '.envs[]? | select(.key == "SUPABASE_URL") | .id' | head -1)

          if [ -n "$ENV_ID" ]; then
            echo "PATCH SUPABASE_URL (id=$ENV_ID)"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$ENV_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value":"https://kdyafjlwbximefwdhbnc.supabase.co","target":["production","preview","development"]}')
            echo "HTTP: $HTTP"
          else
            echo "POST SUPABASE_URL"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"key":"SUPABASE_URL","value":"https://kdyafjlwbximefwdhbnc.supabase.co","type":"plain","target":["production","preview","development"]}')
            echo "HTTP: $HTTP"
          fi

      - name: Upsert SUPABASE_KEY
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          ENVS=$(curl -s \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $TOKEN")

          ENV_ID=$(echo "$ENVS" | jq -r '.envs[]? | select(.key == "SUPABASE_KEY") | .id' | head -1)

          if [ -n "$ENV_ID" ]; then
            echo "PATCH SUPABASE_KEY (id=$ENV_ID)"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$ENV_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value":"sb_publishable_CdtsCYs5j4_SMnq2AA9pxA_ybnpoqCz","target":["production","preview","development"]}')
            echo "HTTP: $HTTP"
          else
            echo "POST SUPABASE_KEY"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"key":"SUPABASE_KEY","value":"sb_publishable_CdtsCYs5j4_SMnq2AA9pxA_ybnpoqCz","type":"encrypted","target":["production","preview","development"]}')
            echo "HTTP: $HTTP"
          fi

      - name: Trigger Vercel deployment
        run: |
          REPO_ID="${{ github.event.repository.id }}"
          echo "Repo ID: $REPO_ID"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"scannerv2\",
              \"project\": \"prj_6KIlo6YA9b8LMJ31455I1abJUEld\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": $REPO_ID,
                \"ref\": \"main\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Deploy API call failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully"
