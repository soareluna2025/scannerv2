name: Deploy AlohaScan to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="/snap/bin:$PATH"
            cd /root/scannerv2
            git pull origin main
            npm install --silent
            pm2 restart alohascan 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
            echo "Deploy complet: $(date)"
            pm2 list
