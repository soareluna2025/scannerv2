name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel via REST API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Repo ID (public API, no auth needed)
          REPO_ID=$(curl -s "https://api.github.com/repos/soareluna2025/scannerv2" | jq -r '.id')
          echo "Repo ID: $REPO_ID"
          echo "SHA: $COMMIT_SHA"

          # Deploy from git source
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"scannerv2\",\"project\":\"prj_6KIlo6YA9b8LMJ31455I1abJUEld\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":$REPO_ID,\"ref\":\"main\",\"sha\":\"$COMMIT_SHA\"}}")

          BODY=$(echo "$RESP" | head -n -1)
          STATUS=$(echo "$RESP" | tail -n 1 | cut -d: -f2)
          echo "HTTP Status: $STATUS"
          echo "$BODY" | jq '.'

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "EROARE: deployment esuat cu HTTP $STATUS"
            exit 1
          fi
          echo "Deployment creat cu succes!"
