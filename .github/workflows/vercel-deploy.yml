name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Vercel REST API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Get GitHub repo numeric ID
          REPO_ID=$(curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/soareluna2025/scannerv2" \
            | jq -r '.id')
          echo "Repo ID: $REPO_ID"

          # Create production deployment from git source (no CLI needed)
          RESP=$(curl -s -X POST \
            "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"scannerv2\",
              \"project\": \"prj_6KIlo6YA9b8LMJ31455I1abJUEld\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"$REPO_ID\",
                \"ref\": \"main\",
                \"sha\": \"${{ github.sha }}\"
              }
            }")

          echo "=== Vercel Response ==="
          echo "$RESP" | jq '.'

          # Fail if there's an error
          ERROR=$(echo "$RESP" | jq -r '.error.message // empty')
          if [ -n "$ERROR" ]; then
            echo "EROARE: $ERROR"
            exit 1
          fi

          URL=$(echo "$RESP" | jq -r '.url // empty')
          echo "Deployment URL: https://$URL"
